name: Update Substack Posts in README

on:
  # Runs every day at 9am Singapore time (1am UTC)
  schedule:
    - cron: "0 1 * * *"

  # Also runs whenever you manually trigger it from GitHub Actions tab
  workflow_dispatch:

  # Also runs on every push to main (instant update)
  push:
    branches:
      - main

jobs:
  update-readme:
    name: Fetch latest Substack posts and update README
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch Substack posts and update README
        run: python scripts/fetch_substack.py

      - name: Commit updated README if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: auto-update Substack posts [skip ci]"
          git push
